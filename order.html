<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order — Quantasana</title>
  <meta name="description" content="Build and order your Quantasana Pod — Founders Edition. Choose your trim, fabric, upgrades, and add-ons.">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;600;700;800&family=Josefin+Sans:ital,wght@0,300;0,400;0,600;1,300&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=16">
  <style>
    /* ============================================
       ORDER PAGE — LAYOUT
       ============================================ */
    .order-page {
      background: #F5F0E8;
      min-height: 100vh;
      padding-bottom: 80px;
    }
    .order-layout {
      display: flex;
      min-height: calc(100vh - 80px);
    }

    /* ── Left: Image carousel ── */
    .order-images {
      width: 60%;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: hidden;
      background: #EDEAE2;
    }
    .order-carousel {
      position: relative;
      width: 100%;
      height: 100%;
    }
    .carousel-slides {
      width: 100%;
      height: 100%;
      position: relative;
    }
    .carousel-slide {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    .carousel-slide.active {
      opacity: 1;
    }
    .carousel-dots {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      z-index: 2;
    }
    .carousel-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      border: none;
      background: rgba(255, 255, 255, 0.4);
      cursor: pointer;
      transition: background 0.3s;
      padding: 0;
    }
    .carousel-dot.active {
      background: #fff;
    }

    /* ── Right: Configurator ── */
    .order-config {
      width: 40%;
      padding: 60px 48px 120px;
      overflow-y: auto;
      background: #F5F0E8;
    }
    .order-header {
      text-align: center;
      margin-bottom: 48px;
    }
    .order-logo {
      width: 40px;
      height: 40px;
      margin-bottom: 16px;
    }
    .order-title {
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      font-size: 1.8rem;
      color: #2C2C2A;
      margin-bottom: 12px;
    }
    .order-subtitle {
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      font-size: 0.8rem;
      line-height: 1.6;
      color: rgba(10, 10, 10, 0.45);
      max-width: 380px;
      margin: 0 auto;
    }

    /* ── Config sections ── */
    .config-section {
      margin-bottom: 40px;
    }
    .config-heading {
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      font-size: 1.3rem;
      color: #2C2C2A;
      margin-bottom: 16px;
    }

    /* ── Option cards ── */
    .config-option {
      display: flex;
      gap: 16px;
      align-items: flex-start;
      padding: 20px;
      border: 1px solid rgba(10, 10, 10, 0.08);
      border-radius: 12px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      background: rgba(255, 255, 255, 0.3);
    }
    .config-option:hover:not(.disabled) {
      background: rgba(255, 255, 255, 0.5);
      border-color: rgba(10, 10, 10, 0.15);
    }
    .config-option.selected {
      border-color: #5A5549;
      background: rgba(255, 255, 255, 0.5);
    }
    .config-option.disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .config-option input {
      display: none;
    }

    /* Custom checkbox/radio */
    .option-check {
      width: 22px;
      height: 22px;
      min-width: 22px;
      border: 1.5px solid rgba(10, 10, 10, 0.2);
      border-radius: 4px;
      margin-top: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .config-option.selected .option-check {
      background: #5A5549;
      border-color: #5A5549;
    }
    .config-option.selected .option-check::after {
      content: '✓';
      color: #F5F0E8;
      font-size: 12px;
      font-weight: 700;
    }
    .option-info {
      flex: 1;
    }
    .option-name {
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: 0.9rem;
      color: #2C2C2A;
      display: block;
      margin-bottom: 2px;
    }
    .option-price {
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      font-size: 0.85rem;
      color: rgba(10, 10, 10, 0.5);
      float: right;
    }
    .option-desc {
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      font-size: 0.78rem;
      line-height: 1.5;
      color: rgba(10, 10, 10, 0.45);
      margin-top: 8px;
      clear: both;
    }
    .option-desc a {
      color: #D4874D;
      text-decoration: none;
    }
    .option-desc a:hover {
      text-decoration: underline;
    }
    /* ── Back nav ── */
    .order-nav {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 200;
    }
    .order-back {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      background: rgba(255, 255, 255, 0.6);
      border: 1px solid rgba(10, 10, 10, 0.08);
      border-radius: 12px;
      text-decoration: none;
      font-size: 1.2rem;
      color: #2C2C2A;
      transition: background 0.3s;
    }
    .order-back:hover {
      background: rgba(255, 255, 255, 0.9);
    }

    .option-badge {
      display: inline-block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.5rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: rgba(10, 10, 10, 0.06);
      color: rgba(10, 10, 10, 0.4);
      padding: 3px 10px;
      border-radius: 4px;
      margin-top: 8px;
    }

    /* ============================================
       STICKY FOOTER BAR
       ============================================ */
    .order-footer-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 80px;
      background: #F5F0E8;
      border-top: 1px solid rgba(10, 10, 10, 0.08);
      display: flex;
      align-items: center;
      padding: 0 48px;
      gap: 24px;
      z-index: 100;
    }
    .order-footer-info {
      flex: 1;
    }
    .order-footer-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.7rem;
      color: rgba(10, 10, 10, 0.35);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .footer-info-icon {
      font-size: 0.75rem;
      opacity: 0.5;
    }
    .order-footer-due {
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: 0.85rem;
      color: #2C2C2A;
    }
    .order-footer-price {
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      font-size: 2rem;
      color: #2C2C2A;
    }
    .order-footer-btn {
      padding: 16px 40px;
      background: #8B8578;
      border: none;
      border-radius: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #F5F0E8;
      cursor: pointer;
      transition: background 0.3s;
      white-space: nowrap;
    }
    .order-footer-btn:hover {
      background: #706B61;
    }

    /* ============================================
       MOBILE
       ============================================ */
    @media (max-width: 768px) {
      .order-layout {
        flex-direction: column;
      }
      .order-images {
        width: 100%;
        height: 50vh;
        position: relative;
      }
      .order-config {
        width: 100%;
        padding: 40px 24px 120px;
      }
      .order-footer-bar {
        padding: 0 20px;
        gap: 12px;
      }
      .order-footer-price {
        font-size: 1.5rem;
      }
      .order-footer-btn {
        padding: 14px 24px;
        font-size: 0.58rem;
      }
      .option-price {
        float: none;
        display: block;
        margin-top: 4px;
      }
    }
  </style>
</head>
<body>

  <script>
  (function() {
    var basePrice = 4500;
    var deposit = 500;
    var totalPrice = basePrice;

    var options = document.querySelectorAll('.config-option');
    var depositDisplay = document.getElementById('deposit-display');
    var continueBtn = document.getElementById('continue-btn');

    // Carousel
    var slides = document.querySelectorAll('.carousel-slide');
    var dots = document.querySelectorAll('.carousel-dot');

    if (dots.length) {
      dots.forEach(function(dot, i) {
        dot.addEventListener('click', function() {
          slides.forEach(function(s) { s.classList.remove('active'); });
          dots.forEach(function(d) { d.classList.remove('active'); });
          slides[i].classList.add('active');
          dots[i].classList.add('active');
          carouselIndex = i;
        });
      });
    }

    // Auto-advance carousel every 4 seconds
    var carouselIndex = 0;
    setInterval(function() {
      if (!slides.length) return;
      carouselIndex = (carouselIndex + 1) % slides.length;
      slides.forEach(function(s) { s.classList.remove('active'); });
      dots.forEach(function(d) { d.classList.remove('active'); });
      slides[carouselIndex].classList.add('active');
      if (dots[carouselIndex]) dots[carouselIndex].classList.add('active');
    }, 4000);

    // Option selection
    options.forEach(function(option) {
      option.addEventListener('click', function(e) {
        if (option.classList.contains('disabled')) {
          e.preventDefault();
          return;
        }

        var input = option.querySelector('input');
        if (!input) return;

        if (input.type === 'radio') {
          var name = input.name;
          var siblings = document.querySelectorAll('input[name="' + name + '"]');
          siblings.forEach(function(sib) {
            sib.closest('.config-option').classList.remove('selected');
          });
          input.checked = true;
          option.classList.add('selected');
        } else {
          input.checked = !input.checked;
          option.classList.toggle('selected', input.checked);
        }

        recalculate();
      });
    });

    function recalculate() {
      totalPrice = basePrice;

      var fabricChecked = document.querySelector('input[name="fabric"]:checked');
      if (fabricChecked) {
        var fabricOption = fabricChecked.closest('.config-option');
        var fabricAdd = parseInt(fabricOption.getAttribute('data-add') || '0');
        totalPrice += fabricAdd;
      }

      document.querySelectorAll('input[name="upgrade"]:checked').forEach(function(input) {
        var add = parseInt(input.closest('.config-option').getAttribute('data-add') || '0');
        totalPrice += add;
      });

      document.querySelectorAll('input[name="addon"]:checked').forEach(function(input) {
        var add = parseInt(input.closest('.config-option').getAttribute('data-add') || '0');
        totalPrice += add;
      });

      if (depositDisplay) depositDisplay.textContent = '$' + deposit.toLocaleString();
    }

    // Continue to summary
    if (continueBtn) {
      continueBtn.addEventListener('click', function() {
        var params = new URLSearchParams();

        var trim = document.querySelector('input[name="trim"]:checked');
        if (trim) {
          params.set('trim', trim.value);
          params.set('trimName', trim.closest('.config-option').getAttribute('data-name'));
          params.set('trimPrice', trim.closest('.config-option').getAttribute('data-price'));
        }

        var fabric = document.querySelector('input[name="fabric"]:checked');
        if (fabric) {
          params.set('fabric', fabric.value);
          params.set('fabricName', fabric.closest('.config-option').getAttribute('data-name'));
          params.set('fabricAdd', fabric.closest('.config-option').getAttribute('data-add'));
        }

        var upgrades = [];
        document.querySelectorAll('input[name="upgrade"]:checked').forEach(function(input) {
          var opt = input.closest('.config-option');
          upgrades.push(opt.getAttribute('data-name') + '|' + opt.getAttribute('data-add'));
        });
        if (upgrades.length) params.set('upgrades', upgrades.join(','));

        var addons = [];
        document.querySelectorAll('input[name="addon"]:checked').forEach(function(input) {
          var opt = input.closest('.config-option');
          addons.push(opt.getAttribute('data-name') + '|' + opt.getAttribute('data-add'));
        });
        if (addons.length) params.set('addons', addons.join(','));

        window.location.href = 'order-summary.html?' + params.toString();
      });
    }

    recalculate();
  })();
  </script>
</body>
