<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout — Quantasana</title>
  <meta name="description" content="Complete your Quantasana Pod reservation.">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;600;700;800&family=Josefin+Sans:ital,wght@0,300;0,400;0,600;1,300&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    .order-nav {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 200;
    }
    .order-back {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      background: rgba(255, 255, 255, 0.6);
      border: 1px solid rgba(10, 10, 10, 0.08);
      border-radius: 12px;
      text-decoration: none;
      font-size: 1.2rem;
      color: #2C2C2A;
      transition: background 0.3s;
    }
    .order-back:hover {
      background: rgba(255, 255, 255, 0.9);
    }

    .checkout-page {
      background: #F5F0E8;
      min-height: 100vh;
      padding: 80px 24px 120px;
      max-width: 560px;
      margin: 0 auto;
    }
    .checkout-header {
      text-align: center;
      margin-bottom: 32px;
    }
    .checkout-logo {
      width: 36px;
      height: 36px;
      margin-bottom: 16px;
    }
    .checkout-title {
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      font-size: 2rem;
      color: #2C2C2A;
    }

    .checkout-card {
      background: rgba(255, 255, 255, 0.4);
      border: 1px solid rgba(10, 10, 10, 0.06);
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 12px;
    }
    .checkout-card-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      color: rgba(10, 10, 10, 0.4);
      margin-bottom: 4px;
    }
    .checkout-card-value {
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: 0.95rem;
      color: #2C2C2A;
    }

    /* Accordion */
    .checkout-details { cursor: pointer; }
    .checkout-summary-toggle {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: 0.95rem;
      color: #2C2C2A;
      list-style: none;
    }
    .checkout-summary-toggle::-webkit-details-marker { display: none; }
    .toggle-icon {
      font-size: 1.2rem;
      color: rgba(10, 10, 10, 0.3);
      transition: transform 0.2s;
    }
    details[open] .toggle-icon { transform: rotate(45deg); }
    .checkout-summary-content {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid rgba(10, 10, 10, 0.06);
    }

    /* Summary lines (reused from summary page) */
    .summary-line {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid rgba(10, 10, 10, 0.05);
    }
    .summary-line:last-child { border-bottom: none; }
    .summary-line-name {
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      font-size: 0.85rem;
      color: #2C2C2A;
    }
    .summary-line-price {
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      font-size: 0.85rem;
      color: rgba(10, 10, 10, 0.5);
    }

    /* Section titles */
    .checkout-section-title {
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      font-size: 1.1rem;
      color: #2C2C2A;
      margin-top: 32px;
      margin-bottom: 16px;
    }

    /* Form fields */
    .checkout-fields {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .checkout-row {
      display: flex;
      gap: 12px;
    }
    .checkout-row .checkout-input { flex: 1; }
    .checkout-input {
      padding: 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      border: 1px solid rgba(10, 10, 10, 0.1);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.5);
      color: #2C2C2A;
      outline: none;
      transition: border-color 0.3s;
      box-sizing: border-box;
      width: 100%;
    }
    .checkout-input:focus { border-color: rgba(10, 10, 10, 0.25); }
    .checkout-input::placeholder { color: rgba(10, 10, 10, 0.3); }

    /* Sticky footer bar */
    .order-footer-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 80px;
      background: #F5F0E8;
      border-top: 1px solid rgba(10, 10, 10, 0.08);
      display: flex;
      align-items: center;
      padding: 0 48px;
      gap: 24px;
      z-index: 100;
    }
    .order-footer-info { flex: 1; }
    .order-footer-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.7rem;
      color: rgba(10, 10, 10, 0.35);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .footer-info-icon { font-size: 0.75rem; opacity: 0.5; }
    .order-footer-due {
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: 0.85rem;
      color: #2C2C2A;
    }
    .order-footer-price {
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      font-size: 2rem;
      color: #2C2C2A;
    }
    .order-footer-btn {
      padding: 16px 40px;
      background: #8B8578;
      border: none;
      border-radius: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #F5F0E8;
      cursor: pointer;
      transition: background 0.3s;
      white-space: nowrap;
    }
    .order-footer-btn:hover:not(:disabled) { background: #706B61; }
    .order-footer-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    @media (max-width: 768px) {
      .order-footer-bar {
        padding: 0 20px;
        gap: 12px;
      }
      .order-footer-price { font-size: 1.5rem; }
      .order-footer-btn {
        padding: 14px 24px;
        font-size: 0.58rem;
      }
      .checkout-row {
        flex-direction: column;
        gap: 12px;
      }
    }
  </style>
</head>
<body>

  <nav class="order-nav">
    <a href="javascript:history.back()" class="order-back">
      <span class="back-arrow">←</span>
    </a>
  </nav>

  <div class="checkout-page">

    <div class="checkout-header">
      <img src="logo.png" class="checkout-logo" alt="Quantasana">
      <h1 class="checkout-title">Checkout</h1>
    </div>

    <!-- Order summary accordion -->
    <div class="checkout-card">
      <details class="checkout-details">
        <summary class="checkout-summary-toggle">
          <span>Summary</span>
          <span class="toggle-icon">+</span>
        </summary>
        <div class="checkout-summary-content" id="checkout-summary"></div>
      </details>
    </div>

    <!-- Build time -->
    <div class="checkout-card">
      <div class="checkout-card-label">Build time</div>
      <div class="checkout-card-value">Est. 6-8 weeks</div>
    </div>

    <!-- Deposit info -->
    <div class="checkout-card">
      <div class="checkout-card-label">Non-refundable deposit</div>
      <div class="checkout-card-value">$500</div>
    </div>

    <!-- Contact info -->
    <h2 class="checkout-section-title">Contact info</h2>
    <div class="checkout-fields">
      <div class="checkout-row">
        <input type="text" placeholder="First name" class="checkout-input" id="first-name" required>
        <input type="text" placeholder="Last name" class="checkout-input" id="last-name" required>
      </div>
      <input type="email" placeholder="Email" class="checkout-input" id="checkout-email" required>
      <input type="tel" placeholder="Phone" class="checkout-input" id="checkout-phone" required>
    </div>

    <!-- Billing address -->
    <h2 class="checkout-section-title">Billing address</h2>
    <div class="checkout-fields">
      <input type="text" placeholder="Address" class="checkout-input" id="address" required>
      <input type="text" placeholder="City" class="checkout-input" id="city" required>
      <div class="checkout-row">
        <input type="text" placeholder="State" class="checkout-input" id="state" required>
        <input type="text" placeholder="Zip Code" class="checkout-input" id="zip" required>
      </div>
    </div>

  </div>

  <!-- Sticky footer bar -->
  <div class="order-footer-bar">
    <div class="order-footer-info">
      <div class="order-footer-label">
        <span class="footer-info-icon">ⓘ</span>
        <span>Non-refundable</span>
      </div>
      <div class="order-footer-due">Amount due today</div>
    </div>
    <div class="order-footer-price">$500</div>
    <button class="order-footer-btn" id="pay-btn" disabled>CONTINUE TO PAYMENT</button>
  </div>

  <script>
  (function() {
    // Populate summary accordion from URL params
    var params = new URLSearchParams(window.location.search);
    var summaryContainer = document.getElementById('checkout-summary');

    function addLine(name, price) {
      var div = document.createElement('div');
      div.className = 'summary-line';
      div.innerHTML = '<span class="summary-line-name">' + name + '</span>' +
                      '<span class="summary-line-price">' + price + '</span>';
      summaryContainer.appendChild(div);
    }

    var trimName = params.get('trimName') || 'Founders Edition';
    var trimPrice = params.get('trimPrice') || '4500';
    addLine(trimName, '$' + parseInt(trimPrice).toLocaleString());

    var fabricName = params.get('fabricName');
    var fabricAdd = parseInt(params.get('fabricAdd') || '0');
    if (fabricName) addLine('Fabric: ' + fabricName, fabricAdd > 0 ? '+$' + fabricAdd : 'Included');

    var upgradesStr = params.get('upgrades');
    if (upgradesStr) {
      upgradesStr.split(',').forEach(function(item) {
        var parts = item.split('|');
        addLine(parts[0], '+$' + parts[1]);
      });
    }

    var addonsStr = params.get('addons');
    if (addonsStr) {
      addonsStr.split(',').forEach(function(item) {
        var parts = item.split('|');
        addLine(parts[0], '+$' + parts[1]);
      });
    }

    // Validate form
    var payBtn = document.getElementById('pay-btn');
    var fields = ['first-name', 'last-name', 'checkout-email', 'checkout-phone', 'address', 'city', 'state', 'zip'];

    function validate() {
      var allFilled = fields.every(function(id) {
        var el = document.getElementById(id);
        return el && el.value.trim() !== '';
      });
      payBtn.disabled = !allFilled;
    }

    fields.forEach(function(id) {
      var el = document.getElementById(id);
      if (el) el.addEventListener('input', validate);
    });

    // Payment button
    payBtn.addEventListener('click', function() {
      payBtn.textContent = 'RESERVATION CONFIRMED ✓';
      payBtn.disabled = true;
      payBtn.style.background = '#5A5549';

      var orderData = {
        config: Object.fromEntries(params),
        contact: {
          firstName: document.getElementById('first-name').value,
          lastName: document.getElementById('last-name').value,
          email: document.getElementById('checkout-email').value,
          phone: document.getElementById('checkout-phone').value
        },
        billing: {
          address: document.getElementById('address').value,
          city: document.getElementById('city').value,
          state: document.getElementById('state').value,
          zip: document.getElementById('zip').value
        },
        deposit: 500
      };

      console.log('Order submitted:', orderData);
    });
  })();
  </script>
</body>
</html>
